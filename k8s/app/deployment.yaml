apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-obs-app
  namespace: app-production
  labels:
    app: k8s-obs-app
    version: "1.0.0"
    managed-by: jenkins
  annotations:
    # These annotations are updated by the Jenkins pipeline on each deploy
    # They give you auditability: who deployed what and when
    deployment.kubernetes.io/build-number: "0"
    deployment.kubernetes.io/git-commit: "initial"
    deployment.kubernetes.io/image-tag: "initial"

spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-obs-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: k8s-obs-app
        version: "1.0.0"
      annotations:
        # Prometheus scrape config — Prometheus Operator reads ServiceMonitor,
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      # imagePullSecrets: tells Kubernetes which credentials to use to pull from Nexus
      imagePullSecrets:
        - name: nexus-pull-secret

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault # Prevents dangerous syscalls (e.g., ptrace, keyctl, mount, umount, chroot)

      # Ensure pods land on different nodes (anti-affinity for true HA)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - k8s-obs-app
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      containers:
        - name: k8s-obs-app
          image: 192.168.1.50:8082/k8s-obs-app:latest
          imagePullPolicy: Always # Always pull the latest image 
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            # Pod metadata injected as env vars — visible in / endpoint response
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

         
          resources:
            requests:
              cpu: "100m"       # 0.1 CPU core
              memory: "128Mi"   # 128 megabytes
            limits:
              cpu: "500m"       # 0.5 CPU core
              memory: "256Mi"   # 256 megabytes
          
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
            successThreshold: 1

          # ---------------------------------------------------------------------------
          # Container Security Context
          # ---------------------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Writable tmp directory (needed by some Node.js operations)
          # readOnlyRootFilesystem: true requires explicit writable mounts
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp

      volumes:
        - name: tmp-dir
          emptyDir: {}

